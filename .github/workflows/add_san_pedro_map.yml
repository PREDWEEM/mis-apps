name: Add San Pedro map point

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/add_san_pedro_map.yml

permissions:
  contents: write

jobs:
  update-map:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Add San Pedro to locations
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("index.html")
          text = path.read_text(encoding="utf-8")
          anchor = '            { coords: [-33.8910, -60.5746], name: "Pergamino", url: "https://appemergenciacombinadopy-zybjv3zntwavn8omppk9ba.streamlit.app/", title: "App Emergencia Combinada", offsetX: 0, offsetY: -35 },\n'
          san_pedro = '            { coords: [-33.7328, -59.7965], name: "San Pedro", url: "https://appemergenciapy-rcr8vp23hogconk5efz374.streamlit.app/", title: "App Emergencia", offsetX: 0, offsetY: -35 },\n'

          if 'name: "San Pedro"' not in text:
              if anchor not in text:
                  raise RuntimeError("No se encontró el punto Pergamino para insertar San Pedro.")
              text = text.replace(anchor, anchor + san_pedro)
              path.write_text(text, encoding="utf-8")

          assert 'coords: [-33.7328, -59.7965]' in text
          assert 'name: "San Pedro"' in text
          assert 'https://appemergenciapy-rcr8vp23hogconk5efz374.streamlit.app/' in text
          assert 'Agradecimiento especial a <strong>Marcos Mitelsky</strong>' in text
          PY

      - name: Commit map correction
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          if git diff --cached --quiet; then
            echo "San Pedro ya estaba incorporado."
            exit 0
          fi
          git commit -m "Agregar punto San Pedro al mapa"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
